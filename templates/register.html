<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register Student - SCC</title>
    <link href="https://fonts.googleapis.com/css2?family=Protest+Strike&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-body">
    <div class="form-container">
        <!-- Left Side: Red Branding -->
        <div class="form-red-side">
            <div class="side-logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}" height="50">
                <div class="side-logo-text">
                    <h2>ST. CECILIA'S SCHOOL</h2>
                    <p>COMPLAINT ASSISTANCE</p>
                </div>
            </div>
            <img src="{{ url_for('static', filename='images/teacher.png') }}" class="teacher-img-left">
        </div>

        <!-- Right Side: Registration Form -->
        <div class="form-white-side">
            <h1 class="create-text">Create Student Account</h1>
            <p class="sub-instruction">Get your 3rd-party email ready for ticket updates!</p>
            
            <form action="/register" method="POST">
                <!-- Full Name -->
                <div class="input-line">
                    <input type="text" name="full_name" placeholder="Full Name (e.g. Juan Dela Cruz)" required>
                </div>

                <!-- 3rd Party Email for Notifications -->
                <div class="input-line">
                    <input type="email" name="email" placeholder="Email (Gmail, Yahoo, or  Apple)" required>
                </div>

                <!-- School ID -->
                <div class="input-line">
                    <input type="text" name="student_id" placeholder="School ID" required>
                </div>

                <!-- Course Dropdown -->
                            <div class="input-line">
                    <select name="course_id" required>
                        <option value="" disabled selected>Select Your Course</option>
                        {% for course in courses %}
                            <option value="{{ course.id }}">{{ course.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Password -->
                <div class="input-line">
                    <input type="password" name="password" placeholder="Create Password" required>
                </div>

                <div class="register-buttons">
                    <button type="button" class="btn-back-reg" onclick="window.location.href='/'">Back</button>
                    <button type="submit" class="btn-confirm">Confirm Account</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
